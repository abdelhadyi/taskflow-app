name: frontend pipeline
on:
  pull_request:
    branches: 
      - main
    paths: 
      - 'src/frontend/**'

jobs:
  Tests:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
#       cache-dependency-path: src/api-gateway/package-lock.json

    - name: lint-test-build
      run: |
        npm install 
      # npm run lint
        npm test
        npm run build
      working-directory: src/frontend

  
  docker:
    runs-on: ubuntu-latest
    needs: Tests
    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: login to registery
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
 
    - name: build and push
      uses: docker/build-push-action@v6
      with:
        push: true
        tags: ${{ vars.DOCKERHUB_USERNAME }}/workflow-app:${{ github.run_id }}
        context: src/frontend/
        file: src/frontend/Dockerfile


  update-k8s:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_TOKEN }}
        ref: ${{ github.head_ref }}

    - name: editing the deployment with the new version
      run: |
        sed -i "s|image: .*|image: ${{ vars.DOCKERHUB_USERNAME }}/workflow-app:${{ github.run_id }}|g" kubernetes/frontend/deploy.yaml

    - name: update-image
      run: |
        git config --local user.email "abdelhady.elsayedd@gmail.com"
        git config --local user.name "abdelhadyi"
        git pull --rebase origin ${{ github.head_ref }}
        git add kubernetes/frontend/deploy.yaml
        git commit -a -m "updating the image version to ${{ github.run_id }} [skip ci]"
        git push origin ${{ github.head_ref }}
