name: project service pipeline
on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
    paths:
    - 'src/project-service/**'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup-python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: lint 
      run: |
        pip install -r requirements.txt 
        flake8 app/ --max-line-length=120 
      working-directory: src/project-service/

    - name: test
      run:
        python -m pytest
      working-directory: src/project-service/

  docker:
    needs: tests
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        push: true
        context: src/project-service/
        file: src/project-service/Dockerfile
        tags: ${{vars.DOCKERHUB_USERNAME}}/taskflow-project:${{ github.run_id }}

  update-image:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GH_TOKEN }}
        ref: ${{ github.head_ref }}

    - name: edit-resource
      run: |
        sed -i "s|image: .*|image: ${{ vars.DOCKERHUB_USERNAME }}/project-service:${{ github.run_id }}|g" kubernetes/project-svc/deploy.yaml

    - name: git
      run: |
        git config --global user.name abdelhadyi
        git config --global user.email abdelhadyy.elsayed@gmail.com
        git add kubernetes/project-svc/deploy.yaml
        git commit -m "update the image version to ${{ github.run_id }} [skip ci] "
        git push origin ${{ github.head_ref }}






